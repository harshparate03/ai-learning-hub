<nav class="navbar app-navbar" [class.nav-open]="isMenuOpen">
  <div class="container navbar-inner">

    <!-- Brand -->
    <a class="brand-logo" routerLink="/" (click)="closeMenu()">
      <span class="brand-mark">
        <app-logo [size]="20" variant="white"></app-logo>
      </span>
      <span class="brand-name">AI Learning Hub</span>
    </a>

    <!-- Mobile toggler -->
    <button class="nav-toggler d-lg-none" type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen"
      aria-controls="mobile-nav-menu"
      aria-label="Toggle navigation menu">
      <span class="toggler-bar" [class.open]="isMenuOpen"></span>
      <span class="toggler-bar" [class.open]="isMenuOpen"></span>
      <span class="toggler-bar" [class.open]="isMenuOpen"></span>
    </button>

    <!-- Desktop nav -->
    <div class="navbar-nav-wrap d-none d-lg-flex align-items-center gap-1 ms-auto">
      <ng-container *ngTemplateOutlet="navLinks"></ng-container>
    </div>

    <!-- Mobile nav -->
    <div id="mobile-nav-menu" class="mobile-nav w-100" *ngIf="isMenuOpen">
      <ng-container *ngTemplateOutlet="navLinks"></ng-container>
    </div>

  </div>
</nav>

<ng-template #navLinks>
  <a class="nav-link-item" routerLink="/"                 routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="isMenuOpen=false">Home</a>
  <a class="nav-link-item" routerLink="/mindmap"           routerLinkActive="active" (click)="isMenuOpen=false">Mind Map</a>
  <a class="nav-link-item" routerLink="/youtube"           routerLinkActive="active" (click)="isMenuOpen=false">YouTube AI</a>
  <a class="nav-link-item" routerLink="/summarizer/upload" routerLinkActive="active" (click)="isMenuOpen=false">Summarizer</a>
  <a class="nav-link-item" routerLink="/summarizer/chat"   routerLinkActive="active" (click)="isMenuOpen=false">Chat PDF</a>
  <a class="nav-link-item" routerLink="/history"           routerLinkActive="active" (click)="isMenuOpen=false">History</a>

  <span class="nav-sep d-none d-lg-inline-block"></span>

  <button class="nav-chat-btn" (click)="openChat()" title="AI Chatbot">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Chat
  </button>

  <button class="theme-toggle" (click)="theme.toggle()">
    <span class="theme-toggle-icon" [class.is-light]="!theme.darkMode">
      <svg *ngIf="theme.darkMode"  width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg *ngIf="!theme.darkMode" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </span>
    {{ theme.darkMode ? 'Light' : 'Dark' }}
  </button>

  <ng-container *ngIf="isLoggedIn">
    <div class="user-chip">
      <span class="user-avatar">{{ (currentUser.charAt(0) || '?').toUpperCase() }}</span>
      <span>{{ currentUser.split('@')[0] | slice:0:12 }}</span>
    </div>
    <button class="btn-logout" (click)="logout()">Sign out</button>
  </ng-container>
</ng-template>

<app-chatbot [open]="isChatOpen" (closed)="isChatOpen = false"></app-chatbot>
