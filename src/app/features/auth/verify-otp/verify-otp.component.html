<div class="auth-page">
  <div class="auth-card">

    <!-- Header -->
    <div class="text-center mb-4">
      <a routerLink="/" class="auth-logo">
        <img src="assets/bg_remove_logo.png" alt="AI Learning Hub" class="auth-logo-img" />
      </a>
      <h2 class="auth-heading">Check Your Email</h2>
      <p class="auth-sub">
        A 6-digit OTP has been sent to<br>
        <strong class="email-highlight">{{ email }}</strong>
      </p>
      <p class="timer-row">
        Expires in
        <span class="timer" [class.timer-warn]="timeLeft < 60">{{ formatTime(timeLeft) }}</span>
      </p>
    </div>

    <!-- Alerts -->
    <div class="auth-alert auth-alert-error" *ngIf="errorMsg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMsg }}
    </div>
    <div class="auth-alert auth-alert-success" *ngIf="successMsg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      {{ successMsg }}
    </div>

    <form (ngSubmit)="onVerify()" novalidate>
      <p class="otp-label">Enter the 6-digit code</p>

      <!-- OTP boxes -->
      <div class="otp-grid">
        <input
          *ngFor="let i of [0,1,2,3,4,5]"
          type="text"
          inputmode="numeric"
          maxlength="1"
          class="otp-box"
          [class.otp-filled]="digits[i]"
          [id]="'otp-' + i"
          [attr.aria-label]="'Digit ' + (i + 1)"
          [(ngModel)]="digits[i]"
          [name]="'d' + i"
          (input)="onDigitInput($event, i)"
          (keydown)="onKeyDown($event, i)"
          (paste)="onPaste($event)"
          [disabled]="loading || expired || !!successMsg" />
      </div>

      <!-- Verify button -->
      <button type="submit" class="auth-submit"
        [class.loading]="loading"
        [disabled]="digits.join('').length !== 6 || loading || expired || !!successMsg">
        <ng-container *ngIf="!loading">
          <span class="btn-icon btn-icon-left">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </span>
          <span class="btn-text">Verify OTP</span>
        </ng-container>
        <ng-container *ngIf="loading">
          <svg class="spin-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
          <span class="btn-text">Verifying...</span>
        </ng-container>
      </button>
    </form>

    <!-- Resend -->
    <div class="resend-row">
      <span>Didn't receive the code?</span>
      <button class="resend-btn" (click)="resendOtp()" [disabled]="resendCooldown > 0 || loading">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-.13-4.44"/>
        </svg>
        {{ resendCooldown > 0 ? ('Resend in ' + resendCooldown + 's') : 'Resend OTP' }}
      </button>
    </div>

    <div class="auth-divider">
      <span class="auth-divider-line"></span>
      <span class="auth-divider-text">Wrong email?</span>
      <span class="auth-divider-line"></span>
    </div>

    <p class="auth-switch">
      <a routerLink="/forgot-password" class="auth-switch-link"><- Change email address</a>
    </p>

  </div>
</div>
