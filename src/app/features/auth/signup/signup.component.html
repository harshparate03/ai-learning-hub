<div class="auth-page">
  <div class="auth-card">

    <!-- Brand mark -->
    <div class="text-center mb-4">
      <a routerLink="/" class="auth-logo">
        <img src="assets/bg_remove_logo.png" alt="AI Learning Hub" class="auth-logo-img" />
      </a>
      <h2 class="auth-heading">Create Account</h2>
      <p class="auth-sub">Start your AI-powered learning journey</p>
    </div>

    <!-- Alerts -->
    <div class="auth-alert auth-alert-error" *ngIf="errorMsg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ errorMsg }}
    </div>
    <div class="auth-alert auth-alert-success" *ngIf="successMsg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      {{ successMsg }}
    </div>

    <!-- Email -->
    <div class="auth-field mb-3">
      <label class="auth-label">Email address</label>
      <div class="auth-input-wrap">
        <span class="auth-input-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </span>
        <input type="email" class="auth-input form-control" [(ngModel)]="email"
          placeholder="you@example.com" autocomplete="email" />
      </div>
    </div>

    <!-- Password -->
    <div class="auth-field mb-3">
      <label class="auth-label">Password</label>
      <div class="auth-input-wrap">
        <span class="auth-input-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" class="auth-input form-control" [(ngModel)]="password"
          placeholder="Create a strong password" autocomplete="new-password" />
      </div>
    </div>

    <!-- Confirm password -->
    <div class="auth-field mb-4">
      <label class="auth-label">Confirm Password</label>
      <div class="auth-input-wrap">
        <span class="auth-input-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </span>
        <input type="password" class="auth-input form-control" [(ngModel)]="confirmPassword"
          placeholder="Confirm your password" autocomplete="new-password"
          (keyup.enter)="signup()" />
      </div>
    </div>

    <button class="auth-submit" (click)="signup()">
      <span>Create Account</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <div class="auth-divider">
      <span class="auth-divider-line"></span>
      <span class="auth-divider-text">Already have an account?</span>
      <span class="auth-divider-line"></span>
    </div>

    <p class="auth-switch">
      <a [routerLink]="['/login']" [queryParams]="redirectUrl !== '/' ? {redirect: redirectUrl} : {}" class="auth-switch-link">Sign in instead</a>
    </p>

  </div>
</div>
