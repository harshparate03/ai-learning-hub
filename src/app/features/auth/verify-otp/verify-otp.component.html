<div class="auth-page">
  <div class="auth-card">

    <div class="text-center mb-4">
      <a routerLink="/" class="auth-logo">
        <span class="auth-logo-mark"><span class="auth-logo-inner"></span></span>
      </a>
      <h2 class="auth-heading">Check Your Email</h2>
      <p class="auth-sub">
        We sent a 6-digit OTP to <strong class="email-highlight">{{ email }}</strong>.<br>
        It expires in
        <span class="timer" [class.timer-warn]="timeLeft < 60">{{ formatTime(timeLeft) }}</span>.
      </p>
    </div>

    <!-- Dev mode hint -->
    <div class="dev-hint" *ngIf="devOtp">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Dev mode — email API unavailable. Your OTP: <code>{{ devOtp }}</code>
    </div>

    <div class="auth-alert auth-alert-error" *ngIf="errorMsg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMsg }}
    </div>

    <div class="auth-alert auth-alert-success" *ngIf="successMsg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      {{ successMsg }}
    </div>

    <form (ngSubmit)="onVerify()" novalidate>
      <!-- OTP digit grid -->
      <div class="otp-grid">
        <input
          *ngFor="let i of [0,1,2,3,4,5]"
          type="text"
          inputmode="numeric"
          maxlength="1"
          class="otp-box"
          [id]="'otp-' + i"
          [attr.aria-label]="'Digit ' + (i + 1)"
          [(ngModel)]="digits[i]"
          [name]="'d' + i"
          (input)="onDigitInput($event, i)"
          (keydown)="onKeyDown($event, i)"
          (paste)="onPaste($event)"
          [disabled]="loading || expired || !!successMsg" />
      </div>

      <button type="submit" class="auth-submit" [disabled]="digits.join('').length !== 6 || loading || expired || !!successMsg">
        <svg *ngIf="loading" class="spin-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        <span *ngIf="!loading">
          Verify OTP
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </span>
        <span *ngIf="loading">Verifying...</span>
      </button>
    </form>

    <div class="resend-row">
      <span>Didn't receive it?</span>
      <button class="resend-btn" (click)="resendOtp()" [disabled]="resendCooldown > 0 || loading">
        {{ resendCooldown > 0 ? ('Resend in ' + resendCooldown + 's') : 'Resend OTP' }}
      </button>
    </div>

    <div class="auth-divider">
      <span class="auth-divider-line"></span>
      <span class="auth-divider-text">Wrong email?</span>
      <span class="auth-divider-line"></span>
    </div>

    <p class="auth-switch">
      <a routerLink="/forgot-password" class="auth-switch-link">Change email address</a>
    </p>

  </div>
</div>
