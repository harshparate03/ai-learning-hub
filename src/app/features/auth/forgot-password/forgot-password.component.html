<div class="auth-page">
  <div class="auth-card">

    <div class="text-center mb-4">
      <a routerLink="/" class="auth-logo">
        <span class="auth-logo-mark"><span class="auth-logo-inner"></span></span>
      </a>
      <h2 class="auth-heading">Forgot Password?</h2>
      <p class="auth-sub">Enter your email and we'll send you a 6-digit OTP to reset your password.</p>
    </div>

    <div class="auth-alert auth-alert-error" *ngIf="errorMsg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMsg }}
    </div>

    <form (ngSubmit)="onSubmit()" novalidate>
      <div class="auth-field mb-4">
        <label class="auth-label">Email address</label>
        <div class="auth-input-wrap">
          <span class="auth-input-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </span>
          <input type="email" class="auth-input form-control"
            [(ngModel)]="email" name="email"
            placeholder="you@example.com"
            autocomplete="email"
            [disabled]="loading" />
        </div>
      </div>

      <button type="submit" class="auth-submit" [disabled]="loading || !email.trim()">
        <svg *ngIf="loading" class="spin-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        <span *ngIf="!loading">
          Send OTP
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </span>
        <span *ngIf="loading">Sending...</span>
      </button>
    </form>

    <div class="auth-divider">
      <span class="auth-divider-line"></span>
      <span class="auth-divider-text">Remembered it?</span>
      <span class="auth-divider-line"></span>
    </div>

    <p class="auth-switch">
      <a routerLink="/login" class="auth-switch-link">Back to Sign In</a>
    </p>

  </div>
</div>
