<div class="auth-page">
  <div class="auth-card">

    <!-- Header -->
    <div class="text-center mb-4">
      <a routerLink="/" class="auth-logo">
        <span class="auth-logo-mark"><span class="auth-logo-inner"></span></span>
      </a>
      <h2 class="auth-heading">Change Password</h2>
      <p class="auth-sub">Logged in as <strong class="email-highlight">{{ currentEmail }}</strong></p>
    </div>

    <!-- Alerts -->
    <div class="auth-alert auth-alert-error" *ngIf="errorMsg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMsg }}
    </div>
    <div class="auth-alert auth-alert-success" *ngIf="successMsg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      {{ successMsg }}
    </div>

    <form (ngSubmit)="onSubmit()" novalidate *ngIf="!successMsg">

      <!-- Current password -->
      <div class="auth-field mb-3">
        <label class="auth-label">Current Password</label>
        <div class="auth-input-wrap">
          <span class="auth-input-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input [type]="showCurrent ? 'text' : 'password'" class="auth-input form-control"
            [(ngModel)]="currentPassword" name="currentPassword"
            placeholder="Enter current password"
            autocomplete="current-password" [disabled]="loading" />
          <button type="button" class="toggle-pw" (click)="showCurrent=!showCurrent" tabindex="-1" aria-label="Toggle">
            <svg *ngIf="!showCurrent" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showCurrent"  width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <!-- New password -->
      <div class="auth-field mb-3">
        <label class="auth-label">New Password</label>
        <div class="auth-input-wrap">
          <span class="auth-input-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </span>
          <input [type]="showNew ? 'text' : 'password'" class="auth-input form-control"
            [(ngModel)]="newPassword" name="newPassword"
            placeholder="At least 6 characters"
            autocomplete="new-password" [disabled]="loading" />
          <button type="button" class="toggle-pw" (click)="showNew=!showNew" tabindex="-1" aria-label="Toggle">
            <svg *ngIf="!showNew" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showNew"  width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <!-- Strength indicator -->
        <div class="strength-wrap" *ngIf="newPassword">
          <div class="strength-bar">
            <div class="strength-fill"
              [style.width.%]="passwordStrength.level * 20"
              [style.background]="passwordStrength.color"></div>
          </div>
          <span class="strength-label" [style.color]="passwordStrength.color">{{ passwordStrength.label }}</span>
        </div>
      </div>

      <!-- Confirm new password -->
      <div class="auth-field mb-4">
        <label class="auth-label">Confirm New Password</label>
        <div class="auth-input-wrap">
          <span class="auth-input-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </span>
          <input [type]="showConfirm ? 'text' : 'password'" class="auth-input form-control"
            [(ngModel)]="confirmPassword" name="confirmPassword"
            placeholder="Repeat new password"
            autocomplete="new-password" [disabled]="loading"
            (keyup.enter)="onSubmit()" />
          <button type="button" class="toggle-pw" (click)="showConfirm=!showConfirm" tabindex="-1" aria-label="Toggle">
            <svg *ngIf="!showConfirm" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showConfirm" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <p class="match-hint match-ok"  *ngIf="confirmPassword && newPassword === confirmPassword">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Passwords match
        </p>
        <p class="match-hint match-err" *ngIf="confirmPassword && newPassword !== confirmPassword">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Passwords do not match
        </p>
      </div>

      <button type="submit" class="auth-submit" [disabled]="loading || !currentPassword || !newPassword || !confirmPassword">
        <svg *ngIf="loading" class="spin-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        <span *ngIf="!loading">
          Update Password
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </span>
        <span *ngIf="loading">Updating…</span>
      </button>

    </form>

    <div class="auth-divider" *ngIf="!successMsg">
      <span class="auth-divider-line"></span>
      <span class="auth-divider-text">or</span>
      <span class="auth-divider-line"></span>
    </div>

    <p class="auth-switch" *ngIf="!successMsg">
      <a routerLink="/" class="auth-switch-link">← Back to app</a>
    </p>

  </div>
</div>
